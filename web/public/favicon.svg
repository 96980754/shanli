<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <!-- 天线 -->
  <rect x="195" y="30" width="10" height="40" fill="#555"/>
  <rect x="185" y="20" width="30" height="16" rx="3" fill="#ff4444"/>

  <!-- 头部 - 正方形 -->
  <rect x="130" y="70" width="140" height="120" rx="8" ry="8" fill="#a8d8ea" stroke="#555" stroke-width="4"/>

  <!-- 眼睛 - 方形 -->
  <rect x="150" y="100" width="40" height="35" rx="4" fill="white" stroke="#555" stroke-width="3"/>
  <rect x="210" y="100" width="40" height="35" rx="4" fill="white" stroke="#555" stroke-width="3"/>
  <rect x="160" y="110" width="20" height="15" rx="2" fill="#333"/>
  <rect x="220" y="110" width="20" height="15" rx="2" fill="#333"/>

  <!-- 嘴巴 - 方形微笑 -->
  <rect x="175" y="150" width="50" height="12" rx="3" fill="none" stroke="#555" stroke-width="3"/>

  <!-- 脸颊 -->
  <rect x="138" y="140" width="20" height="12" rx="4" fill="#ff9999" opacity="0.5"/>
  <rect x="242" y="140" width="20" height="12" rx="4" fill="#ff9999" opacity="0.5"/>

  <!-- 脖子 -->
  <rect x="185" y="190" width="30" height="18" fill="#888" stroke="#555" stroke-width="3"/>

  <!-- 身体 - 正方形 -->
  <rect x="120" y="208" width="160" height="150" rx="10" ry="10" fill="#6ec6ff" stroke="#555" stroke-width="4"/>

  <!-- 控制面板 -->
  <rect x="150" y="238" width="100" height="70" rx="6" fill="#4a9eff" stroke="#555" stroke-width="2"/>

  <!-- 方形按钮 -->
  <rect x="165" y="255" width="16" height="16" rx="3" fill="#ff6b6b" stroke="#555" stroke-width="2"/>
  <rect x="192" y="255" width="16" height="16" rx="3" fill="#ffd93d" stroke="#555" stroke-width="2"/>
  <rect x="219" y="255" width="16" height="16" rx="3" fill="#6bcb6b" stroke="#555" stroke-width="2"/>

  <!-- 指示灯 -->
  <rect x="170" y="282" width="60" height="8" rx="2" fill="#333"/>
  <rect x="178" y="284" width="6" height="4" rx="1" fill="#00ff00"/>
  <rect x="192" y="284" width="6" height="4" rx="1" fill="#00ff00"/>
  <rect x="206" y="284" width="6" height="4" rx="1" fill="#00ff00"/>

  <!-- 左臂 -->
  <rect x="85" y="218" width="30" height="90" rx="6" fill="#a8d8ea" stroke="#555" stroke-width="4"/>
  <rect x="88" y="318" width="24" height="24" rx="4" fill="#a8d8ea" stroke="#555" stroke-width="4"/>

  <!-- 右臂 -->
  <rect x="285" y="218" width="30" height="90" rx="6" fill="#a8d8ea" stroke="#555" stroke-width="4"/>
  <rect x="288" y="318" width="24" height="24" rx="4" fill="#a8d8ea" stroke="#555" stroke-width="4"/>

  <!-- 左腿 -->
  <rect x="150" y="358" width="38" height="75" rx="6" fill="#6ec6ff" stroke="#555" stroke-width="4"/>
  <rect x="142" y="428" width="54" height="20" rx="4" fill="#555" stroke="#555" stroke-width="3"/>

  <!-- 右腿 -->
  <rect x="212" y="358" width="38" height="75" rx="6" fill="#6ec6ff" stroke="#555" stroke-width="4"/>
  <rect x="204" y="428" width="54" height="20" rx="4" fill="#555" stroke="#555" stroke-width="3"/>

  <!-- 身体装饰线 -->
  <line x1="135" y1="343" x2="265" y2="343" stroke="#4a9eff" stroke-width="3" opacity="0.5"/>
</svg>