<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>知识库管理台</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="status-badge status-badge--warning">Admin Console</p>
          <h1>知识库管理台</h1>
          <p id="admin-message" class="message"></p>
        </div>
        <nav>
          <a class="button" href="/documents">进入文档库</a>
          <a class="button" href="/qa">进入问答页</a>
        </nav>
      </header>

      <section class="layout-dashboard admin-dashboard">
        <aside class="panel sidebar admin-kb-panel">
          <section id="kb-create" class="data-card">
            <h2>创建知识库</h2>
            <form id="kb-create-form" class="form-stack">
              <input id="kb-create-name" name="name" placeholder="知识库名称" />
              <input id="kb-create-description" name="description" placeholder="知识库描述" />
              <select id="kb-create-visibility" name="visibility">
                <option value="department">department</option>
                <option value="all">all</option>
                <option value="project">project</option>
                <option value="personal">personal</option>
              </select>
              <button id="kb-create-submit" class="primary-action" type="submit">创建知识库</button>
            </form>
          </section>
          <section class="data-card">
            <h2>知识库列表</h2>
            <section id="kb-list" class="button-list"></section>
            <p id="kb-empty-state" class="empty-state">暂无知识库，请先创建知识库。</p>
          </section>
        </aside>

        <section class="content-grid admin-document-panel">
          <section id="document-workspace" class="panel">
            <section id="document-upload" class="data-card">
              <h2>上传文档</h2>
              <form id="document-upload-form" class="form-stack">
                <input id="document-file" name="file" type="file" />
                <div class="split-panel">
                  <label>可见范围 <select id="document-scope" name="scope"><option value="I">I（内部）</option><option value="C">C（客户）</option><option value="R">R（受限）</option></select></label>
                  <label>文档类型 <select id="document-type" name="document_type"><option value="OTH">OTH（其他）</option><option value="WP">WP（白皮书）</option><option value="PI">PI（产品介绍）</option><option value="UM">UM（用户手册）</option><option value="DG">DG（部署指南）</option><option value="SOL">SOL（解决方案）</option><option value="SM">SM（销售话术）</option><option value="SLA">SLA</option><option value="IG">IG（安装手册）</option><option value="OM">OM（运维管理）</option><option value="FT">FT（故障处理）</option><option value="SPEC">SPEC（产品规格）</option><option value="QG">QG（快速指南）</option><option value="FL">FL（功能清单）</option><option value="CP">CP（竞品分析）</option><option value="CERT">CERT（认证/合规）</option><option value="IMG">IMG（图片）</option></select></label>
                  <label>产品 <select id="document-product" name="product"><option value="GEN">GEN（通用）</option><option value="MC">MC（MCSTARS）</option><option value="MS">MS（MiniServer）</option><option value="MD">MD（MDM）</option><option value="MNO">MNO</option><option value="PRO">PRO</option><option value="UC">UC</option><option value="LOC">LOC（定位）</option></select></label>
                  <label>优先级 <select id="document-priority" name="priority"><option value="P2">P2（参考）</option><option value="P1">P1（重要）</option><option value="P0">P0（核心）</option></select></label>
                </div>
                <button id="upload-document" class="primary-action" type="submit">上传文档</button>
              </form>
            </section>
            <section id="retrieval-policy-summary" class="data-card"><h3>当前检索策略</h3><p id="retrieval-policy-content">加载中……</p></section>
            <section class="data-card">
              <h2>文档列表</h2>
              <section id="document-list" class="document-card-list"></section>
              <p id="document-empty-state" class="empty-state">当前知识库暂无文档。</p>
            </section>
          </section>
        </section>

        <aside class="panel admin-detail-panel">
          <section id="document-detail">
            <p class="status-badge">文档详情</p>
            <h2 id="document-detail-title">未选择文档</h2>
            <dl class="field-list">
              <div><dt>类型</dt><dd id="document-detail-type"></dd></div>
              <div><dt>状态</dt><dd id="document-detail-status"></dd></div>
              <div><dt>块数</dt><dd id="document-detail-block-count"></dd></div>
              <div><dt>切片</dt><dd id="document-detail-chunk-count"></dd></div>
              <div><dt>部门</dt><dd id="document-detail-department"></dd></div>
              <div><dt>产品线</dt><dd id="document-detail-product-line"></dd></div>
              <div><dt>可见范围</dt><dd id="document-detail-visibility"></dd></div>
              <div><dt>密级</dt><dd id="document-detail-security-level"></dd></div>
              <div><dt>标签</dt><dd id="document-detail-tags"></dd></div>
              <div><dt>范围</dt><dd id="document-detail-scope"></dd></div>
              <div><dt>分类</dt><dd id="document-detail-document-type"></dd></div>
              <div><dt>产品</dt><dd id="document-detail-product"></dd></div>
              <div><dt>优先级</dt><dd id="document-detail-priority"></dd></div>
            </dl>
          </section>
          <section id="delete-panel" class="data-card" hidden>
            <h2>确认删除</h2>
            <p id="delete-target"></p>
            <p id="delete-message">删除后不可恢复。</p>
            <button id="confirm-delete" class="danger-action" type="button">确认删除</button>
            <button id="cancel-delete" class="secondary-action" type="button">取消</button>
          </section>
        </aside>
      </section>

      <section class="panel admin-permission-panel split-panel">
        <section id="permission-editor" class="form-stack data-card">
          <h2>用户权限</h2>
          <label>用户 ID <input id="permission-user-id" /></label>
          <label><input id="perm-view" type="checkbox" />查看 / 下载</label>
          <label><input id="perm-upload" type="checkbox" />上传</label>
          <label><input id="perm-delete" type="checkbox" />删除</label>
          <label><input id="perm-grant" type="checkbox" />授权</label>
          <button id="save-permission" class="primary-action" type="button">保存权限</button>
          <button id="delete-kb-button" class="danger-action" type="button">删除知识库</button>
          <aside id="permission-list"></aside>
          <p id="permission-empty-state" class="empty-state">当前暂无授权用户。</p>
        </section>
        <section id="view-rule-editor" class="form-stack data-card">
          <h2>知识视图</h2>
          <label>允许部门 <input id="view-rule-departments" placeholder="售后,交付" /></label>
          <label>允许产品（编码） <input id="view-rule-product-lines" placeholder="MC,MS,GEN" /></label>
          <label><input id="view-rule-public" type="checkbox" />public</label>
          <label><input id="view-rule-internal" type="checkbox" />internal</label>
          <label><input id="view-rule-restricted" type="checkbox" />restricted</label>
          <label>最大密级 <select id="view-rule-max-security-level"><option value="">不限制</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></label>
          <div class="toolbar">
            <button id="load-view-rule" class="secondary-action" type="button">加载知识视图</button>
            <button id="save-view-rule" class="primary-action" type="button">保存知识视图</button>
            <button id="delete-view-rule" class="danger-action" type="button">删除知识视图</button>
          </div>
        </section>
      </section>

      <section id="issue-workspace" class="panel">
        <h2>知识缺口</h2>
        <section id="issue-list" class="document-card-list"></section>
        <p id="issue-empty-state" class="empty-state">当前暂无待处理知识缺口。</p>
      </section>
    </main>
    <script src="/static/admin.js"></script>
  </body>
</html>
